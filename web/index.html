<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goblin's Keep</title>
    <style>
      @font-face {
        font-family: "SuperPixel";
        src: url("/font/SuperPixel-m2L8j.ttf") format("truetype");
        font-display: block;
      }
      @font-face {
        font-family: "PixelPurl";
        src: url("/font/pixelpurl.ttf") format("truetype");
        font-display: block;
      }
      html,
      body {
        margin: 0;
        background: black;
        height: 100%;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        /* Scale the 768x432 internal resolution (16x9 tiles, Pokemon-style
           zoom into the player) to fill the viewport while preserving 16:9. */
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16));
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <canvas id="game" width="768" height="432"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
